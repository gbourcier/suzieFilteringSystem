services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 5m
      OLLAMA_NUM_PARALLEL: "1"
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  digestd:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - ollama
    env_file:
      - ${DIGESTD_ENV_FILE:-.env}
    volumes:
      - digestd-data:/data

volumes:
  ollama-models:
    name: ollama-models
  digestd-data:
    name: digestd-data
